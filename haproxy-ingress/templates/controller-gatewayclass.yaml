{{- if .Values.controller.gatewayClassResource.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  labels:
    {{- include "haproxy-ingress.labels" . | nindent 4 }}
  name: {{ .Values.controller.ingressClass }}
spec:
  controllerName: haproxy-ingress.github.io/controller{{ with .Values.controller.ingressClassResource.controllerClass }}/{{ . }}{{ end }}
{{- end }}
